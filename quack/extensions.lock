# DuckDB extension pins for the SDK's quack client — quack (the wire protocol)
# and httpfs (its transport). COPIED IN LOCKSTEP from solid's
# infra/duckdb/extensions/extensions.lock: the client and the serving engine
# must run the same quack protocol and the extensions are ABI-keyed to the
# exact DuckDB version, so duckdb_version, duckdb_go_version (the go.mod pin),
# and these SHAs move together with the platform's — never independently.
#
# The .duckdb_extension.gz binaries ARE committed alongside this lockfile —
# deliberately unlike solid's fetch-at-build packaging: the SDK is consumed as
# a Go module, and the module zip must carry the //go:embed payload or every
# consumer importing quack fails to build. scripts/duckdb-fetch.sh refreshes
# and SHA-verifies them against these pins on a version bump. //go:embed bakes
# them into the consuming binary, so a solution binary is self-contained and
# air-gapped: the runtime never touches the network.
duckdb_version: 1.5.3
duckdb_go_version: v2.10503.1
extensions:
  - name: quack
    archs:
      linux_amd64:
        sha256: 609be01482fde0bc1d99a64c7ae87134a134638c9c45e39285c64cd57d953f0c
        size: 11445590
      linux_arm64:
        sha256: 91f500eeb19bcaf184b325e80918fa314c024caf111be78bb4a498635337a95f
        size: 10087604
